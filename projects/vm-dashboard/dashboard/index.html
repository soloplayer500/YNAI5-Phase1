<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YNAI5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#12101a;
  --panel:#221b33ee;
  --line:#493b61;
  --text:#f2ebfb;
  --muted:#ad9ec7;
  --purple:#b78df5;
  --pink:#ef86cf;
  --blue:#76d5ff;
  --green:#8ce3a4;
  --red:#ff91aa;
  --yellow:#f5d78d;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  height:100vh;
  overflow:hidden;
  font-family:Inter,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 14% 10%,rgba(183,141,245,.2),transparent 26%),
    radial-gradient(circle at 82% 14%,rgba(239,134,207,.14),transparent 22%),
    linear-gradient(160deg,#0f0d16,#171324 42%,#0f0d16);
}

/* ── GRID SHELL ── */
.app{
  display:grid;
  grid-template-columns:300px 1fr;
  grid-template-rows:64px 1fr 76px;
  height:100vh;
}

/* ── TOP BAR ── */
.top{
  grid-column:1/3;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 22px;
  border-bottom:1px solid rgba(255,255,255,.06);
  background:linear-gradient(180deg,rgba(19,15,28,.92),rgba(13,10,19,.55));
  backdrop-filter:blur(14px);
}
.brand h1{
  margin:0;
  font-size:20px;
  letter-spacing:.22em;
  font-weight:700;
}
.brand-sub{
  font-size:11px;
  color:var(--muted);
  margin-left:10px;
}
.status-bar{
  display:flex;
  align-items:center;
  gap:14px;
  font-size:12px;
  color:var(--muted);
}
.dot{
  width:8px;height:8px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 12px var(--green);
  display:inline-block;
}
.dot.offline{background:var(--red);box-shadow:0 0 12px var(--red);}
.dot.working{background:var(--yellow);box-shadow:0 0 12px var(--yellow);}
#refresh-time{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}

/* ── LEFT PANEL ── */
.left{
  padding:14px;
  border-right:1px solid rgba(255,255,255,.06);
  background:rgba(17,13,25,.55);
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.section{
  padding:12px 14px;
  border-radius:16px;
  background:linear-gradient(180deg,rgba(38,30,56,.82),rgba(24,18,36,.72));
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 8px 28px rgba(0,0,0,.2);
}
.section h3{
  font-size:10px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--purple);
  margin-bottom:9px;
  opacity:.85;
}
.kv-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:4px 8px;
  font-size:12px;
  line-height:1.6;
}
.kv-row .k{color:var(--muted);}
.kv-row .v{color:var(--text);text-align:right;}

/* task + log items */
.item-list{display:flex;flex-direction:column;gap:5px;}
.item{
  padding:7px 10px;
  border-radius:10px;
  background:rgba(7,6,12,.34);
  border:1px solid rgba(255,255,255,.04);
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:#ddd6f2;
  line-height:1.4;
  word-break:break-word;
}
.item.empty{color:var(--muted);font-style:italic;}

/* ── MAIN AREA ── */
.main{
  padding:14px;
  overflow-y:auto;
}
.hero{
  padding:14px 18px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.06);
  background:linear-gradient(135deg,rgba(183,141,245,.1),rgba(239,134,207,.07),rgba(118,213,255,.04));
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}
.hero-title{font-size:15px;font-weight:700;}
.hero-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.chip{
  padding:6px 10px;
  border-radius:10px;
  font-size:11px;
  background:rgba(255,255,255,.04);
  color:var(--muted);
  border:1px solid rgba(255,255,255,.05);
  white-space:nowrap;
}

/* ── AGENT GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:12px;
}
.card{
  border-radius:18px;
  border:1px solid rgba(255,255,255,.06);
  background:linear-gradient(180deg,rgba(43,34,64,.94),rgba(25,20,37,.94));
  box-shadow:0 14px 36px rgba(0,0,0,.22);
  overflow:hidden;
}
.card.conductor-card{
  border-color:rgba(183,141,245,.25);
  background:linear-gradient(180deg,rgba(55,38,80,.96),rgba(30,20,44,.96));
}
.card-head{
  padding:12px 14px;
  border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.card-name{font-weight:700;font-size:13px;}
.card-model{font-size:11px;color:var(--muted);}
.card-body{padding:12px 14px;}
.card-activity{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
.avatar{
  width:40px;height:40px;
  border-radius:13px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  display:grid;place-items:center;
  font-size:18px;
  flex-shrink:0;
  box-shadow:0 0 20px rgba(183,141,245,.25);
}
.avatar.scout{background:linear-gradient(135deg,var(--blue),var(--purple));}
.avatar.director{background:linear-gradient(135deg,var(--pink),var(--purple));}
.avatar.pulse{background:linear-gradient(135deg,#4ade80,var(--blue));}
.avatar.forge{background:linear-gradient(135deg,var(--yellow),var(--pink));}
.avatar.shadow{background:linear-gradient(135deg,var(--green),var(--blue));}
.avatar.echo{background:linear-gradient(135deg,var(--muted),var(--purple));}

.card-state{font-size:11px;color:var(--muted);}
.card-task{
  padding:8px 10px;
  border:1px solid rgba(255,255,255,.05);
  border-radius:12px;
  background:rgba(7,6,12,.34);
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:#ddd6f2;
  min-height:36px;
  word-break:break-word;
}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;}
.badge{
  padding:4px 8px;
  border-radius:999px;
  font-size:10px;
  background:rgba(183,141,245,.12);
  border:1px solid rgba(183,141,245,.22);
  color:#ecdeff;
}
.badge.blue{background:rgba(118,213,255,.12);border-color:rgba(118,213,255,.22);color:#c5edff;}
.badge.green{background:rgba(140,227,164,.12);border-color:rgba(140,227,164,.22);color:#c5f5d3;}
.badge.red{background:rgba(255,145,170,.12);border-color:rgba(255,145,170,.22);color:#ffd6de;}
.badge.yellow{background:rgba(245,215,141,.12);border-color:rgba(245,215,141,.22);color:#f5e6c0;}
.badge.muted{background:rgba(173,158,199,.08);border-color:rgba(173,158,199,.15);color:var(--muted);}

/* state color indicators */
.state-working{color:var(--yellow);}
.state-active{color:var(--green);}
.state-routing{color:var(--purple);}
.state-idle{color:var(--muted);}
.state-watching{color:var(--blue);}
.state-blocked{color:var(--red);}

/* ── BOTTOM COMMAND BAR ── */
.bottom{
  grid-column:1/3;
  padding:12px 18px;
  border-top:1px solid rgba(255,255,255,.06);
  background:linear-gradient(180deg,rgba(14,11,20,.52),rgba(21,16,31,.95));
  display:flex;
  gap:10px;
  align-items:center;
}
#cmd-input{
  flex:1;
  background:rgba(7,6,12,.36);
  border:1px solid rgba(255,255,255,.08);
  color:var(--text);
  padding:12px 16px;
  border-radius:14px;
  font-size:13px;
  font-family:Inter,sans-serif;
  outline:none;
  transition:border-color .2s;
}
#cmd-input:focus{border-color:rgba(183,141,245,.4);}
#cmd-input::placeholder{color:var(--muted);}
#cmd-send{
  border:0;
  border-radius:12px;
  padding:12px 18px;
  font-weight:700;
  font-size:13px;
  color:#140f1a;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  cursor:pointer;
  white-space:nowrap;
  transition:opacity .15s;
}
#cmd-send:hover{opacity:.85;}
#cmd-send:disabled{opacity:.4;cursor:not-allowed;}
.route-chip{
  padding:8px 10px;
  border-radius:10px;
  font-size:11px;
  background:rgba(255,255,255,.04);
  color:var(--muted);
  border:1px solid rgba(255,255,255,.05);
  font-family:'JetBrains Mono',monospace;
  white-space:nowrap;
}

/* scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(183,141,245,.25);border-radius:4px;}
</style>
</head>
<body>
<div class="app">

  <!-- ── TOP BAR ── -->
  <header class="top">
    <div class="brand" style="display:flex;align-items:baseline;gap:10px;">
      <h1>YNAI5</h1>
      <span class="brand-sub">Agent Control Center</span>
    </div>
    <div class="status-bar">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">connecting...</span>
      <span id="refresh-time">--:--:--</span>
    </div>
  </header>

  <!-- ── LEFT PANEL ── -->
  <aside class="left">

    <!-- Orchestrator -->
    <div class="section">
      <h3>Orchestrator</h3>
      <div class="kv-row">
        <span class="k">Name</span><span class="v">YNAI5 Core</span>
        <span class="k">Status</span><span class="v" id="orch-status">—</span>
        <span class="k">Active agent</span><span class="v" id="orch-active">—</span>
        <span class="k">Completed</span><span class="v" id="orch-completed">—</span>
      </div>
    </div>

    <!-- Tasks -->
    <div class="section">
      <h3>Task Queue</h3>
      <div class="item-list" id="task-list">
        <div class="item empty">No tasks queued</div>
      </div>
    </div>

    <!-- Logs -->
    <div class="section">
      <h3>Logs</h3>
      <div class="item-list" id="log-list">
        <div class="item empty">Waiting for events...</div>
      </div>
    </div>

    <!-- Health -->
    <div class="section">
      <h3>Health</h3>
      <div class="kv-row">
        <span class="k">VM CPU</span><span class="v" id="h-cpu">—</span>
        <span class="k">RAM</span><span class="v" id="h-ram">—</span>
        <span class="k">Disk</span><span class="v" id="h-disk">—</span>
        <span class="k">Uptime</span><span class="v" id="h-uptime">—</span>
        <span class="k">Services</span><span class="v" id="h-services">—</span>
        <span class="k">Drive</span><span class="v" id="h-drive">—</span>
      </div>
    </div>

  </aside>

  <!-- ── MAIN AREA ── -->
  <main class="main">
    <div class="hero">
      <div>
        <div class="hero-title">Agent Sandbox</div>
        <div class="hero-sub">Live state from VM · updates every 8s</div>
      </div>
      <span class="chip" id="hero-chip">connecting...</span>
    </div>

    <div class="grid" id="agent-grid">
      <!-- rendered by dashboard.js -->
    </div>
  </main>

  <!-- ── COMMAND BAR ── -->
  <footer class="bottom">
    <input id="cmd-input" type="text" placeholder="Send a task to YNAI5 · prefix @claude to route to Claude..." />
    <span class="route-chip" id="route-indicator">→ gemini</span>
    <button id="cmd-send">Send</button>
  </footer>

</div>

<script src="assets/js/dashboard.js"></script>
</body>
</html>
