name: YNAI5 VM Heartbeat Check

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  check-heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Check VM dashboard API
        run: |
          echo "Checking YNAI5 VM status..."
          STATUS=$(curl -sf --max-time 10 http://${{ secrets.VM_IP }}/api/status 2>&1 || echo '{"error":"unreachable"}')
          echo "VM Response: $STATUS"

          # Extract heartbeat status
          HBSTATUS=$(echo "$STATUS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('heartbeat',{}).get('status','unknown'))" 2>/dev/null || echo "unknown")
          echo "Heartbeat: $HBSTATUS"

          # Notify via Telegram if unreachable
          if echo "$STATUS" | grep -q "unreachable\|error"; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d text="⚠️ YNAI5 VM UNREACHABLE — heartbeat check failed at $(date -u '+%Y-%m-%d %H:%M UTC')"
          else
            echo "VM is healthy — heartbeat: $HBSTATUS"
          fi
